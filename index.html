<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital MedCalc — Clinical Equation Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Deep-space background layers -->
  <div class="space" aria-hidden="true">
    <div class="stars stars-far"></div>
    <div class="stars stars-mid"></div>
    <div class="stars stars-near"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="planet"></div>
    <div class="shooting-star"></div>
  </div>

  <main class="console" role="application" aria-label="Medical equation calculator">
    <header class="console-header">
      <div class="badge">⬡</div>
      <div class="title-block">
        <h1>Orbital MedCalc</h1>
        <p class="subtitle">Clinical Equation Console</p>
      </div>
    </header>

    <div class="field">
      <label for="equationSelect">Equation</label>
      <div class="select-wrap">
        <select id="equationSelect" aria-label="Select equation"></select>
      </div>
    </div>

    <p class="equation-desc" id="equationDesc"></p>

    <form id="calcForm" class="inputs" autocomplete="off">
      <!-- Dynamic input fields are injected here -->
    </form>

    <div class="actions">
      <button class="btn btn-primary" id="calcBtn" type="button">Compute</button>
      <button class="btn btn-ghost" id="resetBtn" type="button">Reset</button>
    </div>

    <section class="result" id="result" aria-live="polite" hidden>
      <div class="result-value">
        <span class="result-number" id="resultNumber">—</span>
        <span class="result-unit" id="resultUnit"></span>
      </div>
      <div class="result-interpretation" id="resultInterpretation"></div>
      <div class="result-breakdown" id="resultBreakdown"></div>
      <div class="result-formula" id="resultFormula"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
